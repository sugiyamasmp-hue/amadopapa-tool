<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amadopapa Tools</title>
<style>
  :root{
    --bg:#eef0f2;
    --card:#ffffff;
    --ink:#2b2f36;
    --sub:#7d8693;
    --line:#dfe3e8;
    --silver:#9aa3ad;
    --silver-deep:#6b7480;
    --amber:#d98a3d;
    --amber-soft:#f6e7d4;
    --shadow:0 1px 2px rgba(43,47,54,.06),0 6px 20px rgba(43,47,54,.07);
    --shadow-hover:0 2px 4px rgba(43,47,54,.08),0 14px 34px rgba(43,47,54,.13);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    background:
      radial-gradient(1200px 500px at 50% -200px,#f7f8fa 0%,var(--bg) 60%);
    color:var(--ink);
    min-height:100vh;
    padding:28px 18px 60px;
    line-height:1.5;
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* ---- Header ---- */
  header{text-align:center;padding:14px 0 30px;}
  .avatar{
    width:74px;height:74px;border-radius:22px;
    margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;
    font-size:38px;
    background:linear-gradient(145deg,#fff,#e9ecef);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
  }
  h1{
    font-size:27px;font-weight:800;letter-spacing:.02em;
    color:var(--ink);
  }
  .tagline{
    margin-top:6px;font-size:13.5px;color:var(--sub);font-weight:500;
  }

  /* ---- Section label ---- */
  .section-label{
    display:flex;align-items:center;gap:12px;
    margin:34px 4px 14px;
    font-size:12px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;color:var(--silver-deep);
  }
  .section-label::after{
    content:"";flex:1;height:1px;background:var(--line);
  }

  /* ---- Grid ---- */
  .grid{
    display:grid;gap:12px;
    grid-template-columns:repeat(2,1fr);
  }
  .grid.compact{grid-template-columns:repeat(2,1fr);}

  /* ---- Card ---- */
  .tool{
    display:flex;align-items:center;gap:13px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:15px 15px;
    text-decoration:none;color:inherit;
    box-shadow:var(--shadow);
    transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;
    min-height:66px;
  }
  .tool:hover,.tool:focus-visible{
    transform:translateY(-2px);
    box-shadow:var(--shadow-hover);
    border-color:#cfd5dc;
    outline:none;
  }
  .tool:focus-visible{outline:2.5px solid var(--amber);outline-offset:2px;}
  .tool:active{transform:translateY(0);}

  .ic{
    flex:0 0 44px;width:44px;height:44px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    background:linear-gradient(150deg,#f4f6f8,#e7ebef);
    border:1px solid var(--line);
  }
  .meta{min-width:0;}
  .name{
    font-size:15px;font-weight:700;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .desc{
    font-size:11.5px;color:var(--sub);font-weight:500;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  /* compact card (others) */
  .tool.mini{padding:13px 14px;min-height:58px;}
  .tool.mini .ic{flex-basis:38px;width:38px;height:38px;font-size:19px;border-radius:11px;}
  .tool.mini .name{font-size:14px;}

  footer{
    text-align:center;margin-top:40px;
    font-size:11.5px;color:var(--silver);letter-spacing:.04em;
  }
  footer .paw{color:var(--silver-deep);}

  @media (max-width:430px){
    .grid,.grid.compact{grid-template-columns:1fr;}
    h1{font-size:24px;}
    body{padding:22px 14px 50px;}
  }
  @media (prefers-reduced-motion:reduce){
    .tool{transition:none;}
  }
</style>
</head>
<body>

      <a class="tool mini" href="https://vercel.com" target="_blank" rel="noopener">
        <span class="ic" aria-hidden="true">▲</span>

      <a class="tool mini" href="https://supabase.com" target="_blank" rel="noopener">

      </a>
      <a class="tool mini" href="https://firebase.google.com/?hl=ja" target="_blank" rel="noopener">

    </div>

    <footer>Developed by amadopapa <span class="paw">🐾</span></footer>
  </div>
</body>
</html>
