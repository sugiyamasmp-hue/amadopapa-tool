<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amadopapatool</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f0;font-family:'Noto Sans JP',sans-serif;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{width:100%;max-width:600px}
.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:22px;font-weight:500;letter-spacing:0.02em;color:#1a1a1a}
.header p{font-size:13px;color:#888;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.card{text-decoration:none;background:white;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem 1rem;display:flex;flex-direction:column;align-items:center;gap:10px;transition:background 0.15s}
.card:hover{background:#f9f9f7}
.icon-box{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon-box.blue{background:#e6f1fb;color:#185fa5}
.icon-box.red{background:#fcebeb;color:#a32d2d}
.icon-box.green{background:#eaf3de;color:#3b6d11}
.icon-box.amber{background:#faeeda;color:#ba7517}
.icon-box.gray{background:#f1efe8;color:#5f5e5a}
.icon-box.gold{background:#faeeda;color:#ba7517}
.card-title{font-size:14px;font-weight:500;color:#1a1a1a;text-align:center}
.card-desc{font-size:12px;color:#888;text-align:center;margin-top:2px}
.dropdown-wrapper{background:#f1efe8;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);overflow:hidden}
.dropdown-btn{width:100%;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;background:transparent;border:none;cursor:pointer}
.dropdown-btn-left{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:#1a1a1a}
.dropdown-content{display:none;border-top:0.5px solid rgba(0,0,0,0.1)}
.dropdown-item{text-decoration:none;display:flex;align-items:center;gap:12px;padding:0.875rem 1.25rem;border-bottom:0.5px solid rgba(0,0,0,0.07);background:transparent;transition:background 0.15s}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{background:white}
.icon-box-sm{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.item-title{font-size:14px;font-weight:500;color:#1a1a1a}
.item-url{font-size:12px;color:#888;margin-top:2px}
.external{font-size:14px;color:#888;margin-left:auto}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Amadopapatool</h1>
    <p>amadopapa のツール集</p>
  </div>

  <div class="grid">
    <a href="https://amadopapa-tool.vercel.app" target="_blank" class="card">
      <div class="icon-box blue"><i class="ti ti-pencil"></i></div>
      <div><div class="card-title">note リライト</div><div class="card-desc">文章をAIで改善</div></div>
    </a>
    <a href="https://ketuatu-git-main-sugiyamasmp-hues-projects.vercel.app" target="_blank" class="card">
      <div class="icon-box red"><i class="ti ti-heart-rate-monitor"></i></div>
      <div><div class="card-title">血圧管理</div><div class="card-desc">記録・グラフ表示</div></div>
    </a>
    <a href="https://kaimono-memo1.vercel.app" target="_blank" class="card">
      <div class="icon-box green"><i class="ti ti-shopping-cart"></i></div>
      <div><div class="card-title">買い物メモ</div><div class="card-desc">リスト作成・共有</div></div>
    </a>
    <a href="https://fp-pink-rho.vercel.app" target="_blank" class="card">
      <div class="icon-box amber"><i class="ti ti-calculator"></i></div>
      <div><div class="card-title">FP ツール</div><div class="card-desc">ファイナンス計算</div></div>
    </a>
    <a href="https://vault-chi-brown.vercel.app" target="_blank" class="card">
      <div class="icon-box gray"><i class="ti ti-database"></i></div>
      <div><div class="card-title">情報管理</div><div class="card-desc">データ保管・整理</div></div>
    </a>
    <a href="https://gold-tracker-two-beryl.vercel.app" target="_blank" class="card">
      <div class="icon-box gold"><i class="ti ti-coin"></i></div>
      <div><div class="card-title">ゴールド</div><div class="card-desc">金価格トラッカー</div></div>
    </a>
  </div>

  <div class="dropdown-wrapper">
    <button class="dropdown-btn" onclick="const d=this.nextElementSibling;const open=d.style.display==='block';d.style.display=open?'none':'block';this.querySelector('i').className='ti '+(open?'ti-chevron-down':'ti-chevron-up');">
      <div class="dropdown-btn-left"><i class="ti ti-apps" style="font-size:18px;color:#888"></i>その他のツール</div>
      <i class="ti ti-chevron-down" style="font-size:16px;color:#888"></i>
    </button>
    <div class="dropdown-content">
      <a href="https://kmc-theta.vercel.app" target="_blank" class="dropdown-item">
        <div class="icon-box-sm blue"><i class="ti ti-users"></i></div>
        <div><div class="item-title">KMC 会員</div><div class="item-url">kmc-theta.vercel.app</div></div>
        <i class="ti ti-external-link external"></i>
      </a>
      <a href="https://wagaya-recipe.vercel.app" target="_blank" class="dropdown-item">
        <div class="icon-box-sm amber"><i class="ti ti-soup"></i></div>
        <div><div class="item-title">我が家のレシピ</div><div class="item-url">wagaya-recipe.vercel.app</div></div>
        <i class="ti ti-external-link external"></i>
      </a>
      <a href="https://amadogyoza.vercel.app" target="_blank" class="dropdown-item">
        <div class="icon-box-sm green"><i class="ti ti-tools-kitchen-2"></i></div>
        <div><div class="item-title">餃子ログ</div><div class="item-url">amadogyoza.vercel.app</div></div>
        <i class="ti ti-external-link external"></i>
      </a>
    </div>
  </div>
</div>
</body>
</html>
